name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

env:
  NX_VERBOSE_LOGGING: 'true'
  NX_CLOUD_VERBOSE_LOGGING: 'true'

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      - run: npx nx start-ci-run --distribute-on="manual" --require-explicit-completion

      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      # Prepend any command with "nx record --" to record its logs to Nx Cloud
      - run: npx nx record -- echo Hello World
      # - run: npx nx run-many -t lint test build typecheck e2e

  agent:
    name: Agent ${{ matrix.agent }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Add more agents here as your repository expands
        agent: [1, 2, 3]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
      - run: npx playwright install --only-shell

      - name: Start Nx Agent ${{ matrix.agent }}
        run: npx nx start-agent
        env:
          NX_AGENT_NAME: ${{ matrix.agent }}

  build-test:
    runs-on: ubuntu-latest
    needs: [main, agent]
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@v4
      - run: npx nx affected -t lint test build

  complete-run:
    runs-on: ubuntu-latest
    needs: [build-test]
    if: always()
    steps:
      - run: npx nx complete-ci-run
